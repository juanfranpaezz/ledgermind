spring:
  application:
    name: ledgermind
  datasource:
    url: jdbc:postgresql://localhost:5432/ledgermind
    username: ledgermind
    password: ledgermind
  jpa:
    # Flyway es el dueño del esquema; Hibernate solo VALIDA que las entidades coincidan.
    hibernate:
      ddl-auto: validate
    # Evitamos el anti-patron Open-Session-In-View (mantiene la sesion JPA abierta en la capa web).
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        # Ordena los UPDATE/INSERT por entidad+id antes de flushear: dos transferencias opuestas
        # (A->B y B->A) adquieren los locks de fila en el MISMO orden -> reduce el deadlock 40P01 de raiz.
        # (El retry de TransferService cubre el deadlock residual; esto baja su frecuencia.)
        order_updates: true
        order_inserts: true
  flyway:
    enabled: true
  mvc:
    problemdetails:
      # Los errores que Spring resuelve solo (validacion @Valid -> MethodArgumentNotValidException, body
      # JSON malformado -> HttpMessageNotReadableException, media-type, type-mismatch) se serializan como
      # ProblemDetail RFC 7807, IGUAL que las excepciones de dominio. Sin esto el 400 mas frecuente del
      # cliente caia al shape legacy {timestamp,status,error,path}: dos contratos de error en la misma API.
      enabled: true
  ai:
    mcp:
      server:
        name: ledgermind-mcp
        version: 0.0.1
        protocol: STREAMABLE   # endpoint MCP = /mcp (mcp-security no soporta el SSE deprecado)
  security:
    oauth2:
      resourceserver:
        jwt:
          # Lazy: el decoder se crea SIN fetch al arranque; valida contra el JWKS del emisor en la 1ra llamada a /mcp.
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8080/oauth2/jwks}

management:
  endpoints:
    web:
      exposure:
        include: health   # info/prometheus fuera de la superficie publica (evita fuga de metricas operativas)
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ledgermind
