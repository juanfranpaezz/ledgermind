spring:
  application:
    name: ledgermind
  datasource:
    url: jdbc:postgresql://localhost:5432/ledgermind
    username: ledgermind
    password: ledgermind
  jpa:
    # Flyway es el dueño del esquema; Hibernate solo VALIDA que las entidades coincidan.
    hibernate:
      ddl-auto: validate
    # Evitamos el anti-patron Open-Session-In-View (mantiene la sesion JPA abierta en la capa web).
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  ai:
    mcp:
      server:
        name: ledgermind-mcp
        version: 0.0.1
        protocol: STREAMABLE   # endpoint MCP = /mcp (mcp-security no soporta el SSE deprecado)
  security:
    oauth2:
      resourceserver:
        jwt:
          # Lazy: el decoder se crea SIN fetch al arranque; valida contra el JWKS del emisor en la 1ra llamada a /mcp.
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8080/oauth2/jwks}

management:
  endpoints:
    web:
      exposure:
        include: health   # info/prometheus fuera de la superficie publica (evita fuga de metricas operativas)
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ledgermind
