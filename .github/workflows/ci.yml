name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Corre el build completo + tests. Testcontainers usa el Docker del runner de GitHub.
      - name: Build and test
        run: |
          chmod +x ./mvnw
          ./mvnw -B -ntp verify
